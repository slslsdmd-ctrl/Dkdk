<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AZTEC BET</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 100%);font-family:system-ui;color:white;min-height:100vh}
        .container{max-width:500px;margin:0 auto;padding:20px}
        .balance-card{background:linear-gradient(135deg,#1e2a3a 0%,#0f172a 100%);border-radius:25px;padding:20px;text-align:center;margin-bottom:25px}
        .balance-value{font-size:48px;font-weight:bold;color:#ffd700}
        .btn{display:block;width:100%;padding:15px;margin:10px 0;border-radius:15px;font-size:16px;font-weight:bold;cursor:pointer;border:none}
        .btn-deposit{background:#2ecc71;color:white}
        .btn-withdraw{background:#e74c3c;color:white}
        .btn-wallet{background:#3498db;color:white}
        .games-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:20px}
        .game-card{background:rgba(255,255,255,0.1);border-radius:20px;padding:20px;text-align:center;cursor:pointer}
        .game-emoji{font-size:48px;margin-bottom:10px}
        .game-name{font-size:14px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:1000;align-items:center;justify-content:center}
        .modal-content{background:#16213e;border-radius:30px;width:90%;max-width:400px;padding:20px}
        .modal-header{display:flex;justify-content:space-between;margin-bottom:20px}
        .close-btn{background:none;border:none;color:white;font-size:24px;cursor:pointer}
        .bet-input{width:100%;padding:12px;border-radius:15px;border:1px solid #ffd700;background:rgba(255,255,255,0.1);color:white;font-size:16px;margin:10px 0;text-align:center}
        .choice-buttons{display:flex;gap:10px;margin:20px 0}
        .choice-btn{flex:1;padding:12px;background:rgba(255,215,0,0.2);border:1px solid #ffd700;border-radius:15px;color:white;cursor:pointer;text-align:center}
        .spin-btn{background:linear-gradient(135deg,#f39c12,#e67e22);border:none;padding:15px;border-radius:30px;color:white;font-size:18px;font-weight:bold;cursor:pointer;width:100%;margin-top:15px}
        .slot-reels{display:flex;justify-content:center;gap:15px;margin:20px 0}
        .slot-reel{font-size:48px;background:rgba(0,0,0,0.5);padding:15px;border-radius:15px;min-width:70px;text-align:center}
        .number-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:20px 0}
        .num-btn{padding:12px;background:rgba(255,215,0,0.2);border:1px solid #ffd700;border-radius:15px;color:white;cursor:pointer}
        .result-text{padding:15px;border-radius:15px;margin-top:15px;text-align:center}
        .win{background:rgba(46,204,113,0.3);color:#2ecc71}
        .lose{background:rgba(231,76,60,0.3);color:#e74c3c}
        .draw{background:rgba(241,196,15,0.3);color:#f1c40f}
        .footer{text-align:center;margin-top:30px;padding:15px;font-size:12px;color:#666}
    </style>
</head>
<body>
    <div class="container">
        <div class="balance-card">
            <div class="balance-label">рҹ’° Р‘РҗРӣРҗРқРЎ</div>
            <div class="balance-value" id="balance">0</div>
            <div class="balance-label">TON</div>
        </div>

        <button class="btn btn-deposit" id="depositBtn">рҹ’Һ РҹРһРҹРһРӣРқРҳРўР¬</button>
        <button class="btn btn-withdraw" id="withdrawBtn">рҹ’ё Р’Р«Р’Р•РЎРўРҳ</button>
        <button class="btn btn-wallet" id="walletBtn">рҹ”— TON CONNECT</button>

        <div class="games-grid">
            <div class="game-card" data-game="coin"><div class="game-emoji">рҹӘҷ</div><div class="game-name">РңРҫРҪРөСӮРәР°</div></div>
            <div class="game-card" data-game="number"><div class="game-emoji">рҹ”ў</div><div class="game-name">Р§РёСҒР»Рҫ</div></div>
            <div class="game-card" data-game="dice"><div class="game-emoji">рҹҺІ</div><div class="game-name">РҡРҫСҒСӮРё</div></div>
            <div class="game-card" data-game="slot"><div class="game-emoji">рҹҺ°</div><div class="game-name">РЎР»РҫСӮСӢ</div></div>
            <div class="game-card" data-game="roulette"><div class="game-emoji">рҹҺЎ</div><div class="game-name">Р СғР»РөСӮРәР°</div></div>
            <div class="game-card" data-game="rps"><div class="game-emoji">вңӮпёҸ</div><div class="game-name">РҡРқР‘</div></div>
        </div>

        <div class="footer">AZTEC BET</div>
    </div>

    <div class="modal" id="gameModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="gameTitle">РҳРіСҖР°</h3>
                <button class="close-btn" id="closeGameModal">&times;</button>
            </div>
            <div class="modal-body" id="gameContent"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let currentBalance = 0;

        function updateBalance(value) {
            currentBalance = value;
            document.getElementById('balance').textContent = currentBalance;
        }

        function showResult(message, type) {
            const gameContent = document.getElementById('gameContent');
            const resultDiv = document.createElement('div');
            resultDiv.className = 'result-text ' + type;
            resultDiv.textContent = message;
            gameContent.appendChild(resultDiv);
            setTimeout(() => resultDiv.remove(), 2000);
        }

        // РңРһРқР•РўРҡРҗ
        function playCoin() {
            const bet = parseFloat(document.getElementById('betAmount').value);
            if (isNaN(bet) || bet < 0.1) {
                tg.showPopup({ title: 'РһСҲРёРұРәР°', message: 'Р’РІРөРҙРёСӮРө СҒСӮР°РІРәСғ РҫСӮ 0.1 TON' });
                return;
            }
            const choice = document.querySelector('input[name="choice"]:checked').value;
            const result = Math.random() < 0.5 ? 'РҫСҖРөР»' : 'СҖРөСҲРәР°';
            const win = choice === result;
            const amount = win ? bet * 2 : -bet;
            showResult(win ? 'рҹҺү РҹРһР‘Р•Р”Рҗ! +' + amount + ' TON (' + result + ')' : 'рҹҳў РҹР РһРҳР“Р Р«РЁ! -' + bet + ' TON (' + result + ')', win ? 'win' : 'lose');
            tg.sendData(JSON.stringify({ action: 'game_result', amount: amount }));
        }

        // Р§РҳРЎРӣРһ
        function playNumber() {
            const bet = parseFloat(document.getElementById('betAmount').value);
            const guess = parseInt(document.getElementById('selectedNumber').value);
            if (isNaN(bet) || bet < 0.1) {
                tg.showPopup({ title: 'РһСҲРёРұРәР°', message: 'Р’РІРөРҙРёСӮРө СҒСӮР°РІРәСғ РҫСӮ 0.1 TON' });
                return;
            }
            const result = Math.floor(Math.random() * 10) + 1;
            const win = guess === result;
            const amount = win ? bet * 3 : -bet;
            showResult(win ? 'рҹҺү РҹРһР‘Р•Р”Рҗ! +' + amount + ' TON (РұСӢР»Рҫ ' + result + ')' : 'рҹҳў РҹР РһРҳР“Р Р«РЁ! -' + bet + ' TON (РұСӢР»Рҫ ' + result + ')', win ? 'win' : 'lose');
            tg.sendData(JSON.stringify({ action: 'game_result', amount: amount }));
        }

        // РҡРһРЎРўРҳ
        function playDice() {
            const bet = parseFloat(document.getElementById('betAmount').value);
            const choice = document.querySelector('input[name="diceChoice"]:checked').value;
            if (isNaN(bet) || bet < 0.1) {
                tg.showPopup({ title: 'РһСҲРёРұРәР°', message: 'Р’РІРөРҙРёСӮРө СҒСӮР°РІРәСғ РҫСӮ 0.1 TON' });
                return;
            }
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            const sum = d1 + d2;
            let win = false, amount = -bet, msg = '';

            if (choice === 'sum') {
                const guess = parseInt(document.getElementById('diceSum').value);
                if (guess === sum) { win = true; amount = bet * 3; msg = 'рҹҺү РҹРһР‘Р•Р”Рҗ! +' + amount + ' TON (' + d1 + '+' + d2 + '=' + sum + ')'; }
                else { msg = 'рҹҳў РҹР РһРҳР“Р Р«РЁ! -' + bet + ' TON (' + d1 + '+' + d2 + '=' + sum + ')'; }
            } else if (choice === 'over') {
                if (sum > 7) { win = true; amount = bet * 2; msg = 'рҹҺү РҹРһР‘Р•Р”Рҗ! +' + amount + ' TON (' + d1 + '+' + d2 + '=' + sum + ')'; }
                else if (sum < 7) { msg = 'рҹҳў РҹР РһРҳР“Р Р«РЁ! -' + bet + ' TON (' + d1 + '+' + d2 + '=' + sum + ')'; }
                else { msg = 'рҹҳҗ РқРҳР§Р¬РҜ! (' + d1 + '+' + d2 + '=7)'; amount = 0; }
            } else {
                const isEven = sum % 2 === 0;
                if ((choice === 'even' && isEven) || (choice === 'odd' && !isEven)) { win = true; amount = bet * 2; msg = 'рҹҺү РҹРһР‘Р•Р”Рҗ! +' + amount + ' TON (' + d1 + '+' + d2 + '=' + sum + ')'; }
                else { msg = 'рҹҳў РҹР РһРҳР“Р Р«РЁ! -' + bet + ' TON (' + d1 + '+' + d2 + '=' + sum + ')'; }
            }
            showResult(msg, win ? 'win' : (amount === 0 ? 'draw' : 'lose'));
            tg.sendData(JSON.stringify({ action: 'game_result', amount: amount }));
        }

        // РЎРӣРһРўР«
        let spinning = false;
        function playSlot() {
            const bet = parseFloat(document.getElementById('betAmount').value);
            if (isNaN(bet) || bet < 0.1) {
                tg.showPopup({ title: 'РһСҲРёРұРәР°', message: 'Р’РІРөРҙРёСӮРө СҒСӮР°РІРәСғ РҫСӮ 0.1 TON' });
                return;
            }
            if (spinning) return;
            spinning = true;
            const symbols = ['рҹҚ’', 'рҹҚӢ', 'рҹҚҠ', 'рҹҚү', 'рҹ’Һ', '7пёҸвғЈ', 'вӯҗ', 'рҹҺ°'];
            const reels = [document.getElementById('slot1'), document.getElementById('slot2'), document.getElementById('slot3')];
            let spins = 0;
            const interval = setInterval(() => {
                reels.forEach(r => r.textContent = symbols[Math.floor(Math.random() * symbols.length)]);
                spins++;
                if (spins >= 10) {
                    clearInterval(interval);
                    const s1 = reels[0].textContent, s2 = reels[1].textContent, s3 = reels[2].textContent;
                    let mult = 0;
                    if (s1 === s2 && s2 === s3) {
                        if (s1 === '7пёҸвғЈ' || s1 === 'рҹ’Һ' || s1 === 'рҹҺ°') mult = 5;
                        else if (s1 === 'рҹҚү') mult = 4;
                        else if (s1 === 'рҹҚ’' || s1 === 'рҹҚӢ' || s1 === 'рҹҚҠ') mult = 3;
                        else if (s1 === 'вӯҗ') mult = 2;
                    }
                    const win = mult > 0;
                    const amount = win ? bet * mult : -bet;
                    showResult(win ? 'рҹҺү Р’Р«РҳР“Р Р«РЁ! +' + amount + ' TON' : 'рҹҳў РҹР РһРҳР“Р Р«РЁ! -' + bet + ' TON', win ? 'win' : 'lose');
                    tg.sendData(JSON.stringify({ action: 'game_result', amount: amount }));
                    spinning = false;
                }
            }, 80);
        }

        // Р РЈРӣР•РўРҡРҗ
        function playRoulette() {
            const bet = parseFloat(document.getElementById('betAmount').value);
            const choice = document.querySelector('input[name="rouletteChoice"]:checked').value;
            if (isNaN(bet) || bet < 0.1) {
                tg.showPopup({ title: 'РһСҲРёРұРәР°', message: 'Р’РІРөРҙРёСӮРө СҒСӮР°РІРәСғ РҫСӮ 0.1 TON' });
                return;
            }
            const num = Math.floor(Math.random() * 37);
            const red = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
            const black = [2,4,6,8,10,11,13,15,17,20,22,24,26,28,29,31,33,35];
            let win = false, amount = -bet, msg = '';

            if (choice === 'red') {
                if (red.includes(num)) { win = true; amount = bet * 2; msg = 'рҹҺү РҹРһР‘Р•Р”Рҗ! +' + amount + ' TON (' + num + ' рҹ”ҙ)'; }
                else { msg = 'рҹҳў РҹР РһРҳР“Р Р«РЁ! -' + bet + ' TON (' + num + ')'; }
            } else if (choice === 'black') {
                if (black.includes(num)) { win = true; amount = bet * 2; msg = 'рҹҺү РҹРһР‘Р•Р”Рҗ! +' + amount + ' TON (' + num + ' вҡ«)'; }
                else { msg = 'рҹҳў РҹР РһРҳР“Р Р«РЁ! -' + bet + ' TON (' + num + ')'; }
            } else {
                const guess = parseInt(document.getElementById('rouletteNum').value);
                if (guess === num) { win = true; amount = bet * 36; msg = 'рҹҺү Р”Р–Р•РҡРҹРһРў! +' + amount + ' TON (' + num + ')'; }
                else { msg = 'рҹҳў РҹР РһРҳР“Р Р«РЁ! -' + bet + ' TON (' + num + ')'; }
            }
            showResult(msg, win ? 'win' : 'lose');
            tg.sendData(JSON.stringify({ action: 'game_result', amount: amount }));
        }

        // РҡРқР‘
        function playRPS() {
            const bet = parseFloat(document.getElementById('betAmount').value);
            const choice = document.querySelector('input[name="rpsChoice"]:checked').value;
            if (isNaN(bet) || bet < 0.1) {
                tg.showPopup({ title: 'РһСҲРёРұРәР°', message: 'Р’РІРөРҙРёСӮРө СҒСӮР°РІРәСғ РҫСӮ 0.1 TON' });
                return;
            }
            const choices = ['rock', 'scissors', 'paper'];
            const bot = choices[Math.floor(Math.random() * 3)];
            const names = { rock: 'рҹӘЁ', scissors: 'вңӮпёҸ', paper: 'рҹ“„' };
            let win = false, amount = -bet, msg = '';

            if (choice === bot) { amount = 0; msg = 'рҹҳҗ РқРҳР§Р¬РҜ! ' + names[choice] + ' vs ' + names[bot]; }
            else if ((choice === 'rock' && bot === 'scissors') || (choice === 'scissors' && bot === 'paper') || (choice === 'paper' && bot === 'rock')) {
                win = true; amount = bet * 2; msg = 'рҹҺү РҹРһР‘Р•Р”Рҗ! +' + amount + ' TON';
            } else { msg = 'рҹҳў РҹР РһРҳР“Р Р«РЁ! -' + bet + ' TON'; }
            showResult(msg, win ? 'win' : (amount === 0 ? 'draw' : 'lose'));
            tg.sendData(JSON.stringify({ action: 'game_result', amount: amount }));
        }

        function openGame(game) {
            const modal = document.getElementById('gameModal');
            const gameTitle = document.getElementById('gameTitle');
            const gameContent = document.getElementById('gameContent');
            let html = '';

            if (game === 'coin') {
                gameTitle.textContent = 'рҹӘҷ РңРҫРҪРөСӮРәР°';
                html = '<div><input type="number" id="betAmount" class="bet-input" placeholder="РЎСӮР°РІРәР° РІ TON" step="0.1" min="0.1"><div class="choice-buttons"><label class="choice-btn"><input type="radio" name="choice" value="РҫСҖРөР»" checked> рҹӘЁ РһР Р•Рӣ</label><label class="choice-btn"><input type="radio" name="choice" value="СҖРөСҲРәР°"> рҹ“„ Р Р•РЁРҡРҗ</label></div><button class="spin-btn" onclick="playCoin()">РЎР”Р•РӣРҗРўР¬ РЎРўРҗР’РҡРЈ</button></div>';
            } else if (game === 'number') {
                let btns = '';
                for (let i = 1; i <= 10; i++) {
                    btns += '<button class="num-btn" onclick="document.querySelectorAll(\'.num-btn\').forEach(b=>b.style.background=\'rgba(255,215,0,0.2)\'); this.style.background=\'#ffd700\'; document.getElementById(\'selectedNumber\').value=' + i + '">' + i + '</button>';
                }
                gameTitle.textContent = 'рҹ”ў РЈРіР°РҙР°Р№ СҮРёСҒР»Рҫ';
                html = '<div><input type="number" id="betAmount" class="bet-input" placeholder="РЎСӮР°РІРәР° РІ TON" step="0.1" min="0.1"><input type="hidden" id="selectedNumber" value="1"><div class="number-grid">' + btns + '</div><button class="spin-btn" onclick="playNumber()">РЎР”Р•РӣРҗРўР¬ РЎРўРҗР’РҡРЈ</button></div>';
            } else if (game === 'dice') {
                gameTitle.textContent = 'рҹҺІ РҡРҫСҒСӮРё';
                html = '<div><input type="number" id="betAmount" class="bet-input" placeholder="РЎСӮР°РІРәР° РІ TON" step="0.1" min="0.1"><div class="choice-buttons"><label class="choice-btn"><input type="radio" name="diceChoice" value="sum" checked> РЎРЈРңРңРҗ</label><label class="choice-btn"><input type="radio" name="diceChoice" value="over"> >7 / <7</label><label class="choice-btn"><input type="radio" name="diceChoice" value="even"> Р§РҒРў/РқР•Р§Р•Рў</label></div><div id="diceExtra"><input type="number" id="diceSum" class="bet-input" placeholder="РЎСғРјРјР° (2-12)" min="2" max="12"></div><button class="spin-btn" onclick="playDice()">РЎР”Р•РӣРҗРўР¬ РЎРўРҗР’РҡРЈ</button></div>';
            } else if (game === 'slot') {
                gameTitle.textContent = 'рҹҺ° РЎР»РҫСӮСӢ';
                html = '<div><input type="number" id="betAmount" class="bet-input" placeholder="РЎСӮР°РІРәР° РІ TON" step="0.1" min="0.1"><div class="slot-reels"><div class="slot-reel" id="slot1">рҹҚ’</div><div class="slot-reel" id="slot2">рҹҚ’</div><div class="slot-reel" id="slot3">рҹҚ’</div></div><button class="spin-btn" onclick="playSlot()">Р—РҗРҹРЈРЎРўРҳРўР¬</button></div>';
            } else if (game === 'roulette') {
                gameTitle.textContent = 'рҹҺЎ Р СғР»РөСӮРәР°';
                html = '<div><input type="number" id="betAmount" class="bet-input" placeholder="РЎСӮР°РІРәР° РІ TON" step="0.1" min="0.1"><div class="choice-buttons"><label class="choice-btn"><input type="radio" name="rouletteChoice" value="red" checked> рҹ”ҙ РҡР РҗРЎРқРһР•</label><label class="choice-btn"><input type="radio" name="rouletteChoice" value="black"> вҡ« Р§РҒР РқРһР•</label><label class="choice-btn"><input type="radio" name="rouletteChoice" value="number"> рҹ”ў Р§РҳРЎРӣРһ</label></div><div id="rouletteExtra"></div><button class="spin-btn" onclick="playRoulette()">РЎР”Р•РӣРҗРўР¬ РЎРўРҗР’РҡРЈ</button></div>';
            } else if (game === 'rps') {
                gameTitle.textContent = 'вңӮпёҸ РҡРқР‘';
                html = '<div><input type="number" id="betAmount" class="bet-input" placeholder="РЎСӮР°РІРәР° РІ TON" step="0.1" min="0.1"><div class="choice-buttons"><label class="choice-btn"><input type="radio" name="rpsChoice" value="rock" checked> рҹӘЁ РҡРҗРңР•РқР¬</label><label class="choice-btn"><input type="radio" name="rpsChoice" value="scissors"> вңӮпёҸ РқРһР–РқРҳРҰР«</label><label class="choice-btn"><input type="radio" name="rpsChoice" value="paper"> рҹ“„ Р‘РЈРңРҗР“Рҗ</label></div><button class="spin-btn" onclick="playRPS()">РЎР”Р•РӣРҗРўР¬ РЎРўРҗР’РҡРЈ</button></div>';
            }

            gameContent.innerHTML = html;
            modal.style.display = 'flex';

            // Р”РҫРҝ РҪР°СҒСӮСҖРҫР№РәРё
            document.querySelectorAll('input[name="diceChoice"]').forEach(r => {
                r.onchange = () => {
                    const extra = document.getElementById('diceExtra');
                    if (r.value === 'sum') extra.innerHTML = '<input type="number" id="diceSum" class="bet-input" placeholder="РЎСғРјРјР° (2-12)" min="2" max="12">';
                    else extra.innerHTML = '';
                };
            });
            document.querySelectorAll('input[name="rouletteChoice"]').forEach(r => {
                r.onchange = () => {
                    const extra = document.getElementById('rouletteExtra');
                    if (r.value === 'number') extra.innerHTML = '<input type="number" id="rouletteNum" class="bet-input" placeholder="Р§РёСҒР»Рҫ (0-36)" min="0" max="36">';
                    else extra.innerHTML = '';
                };
            });
        }

        document.getElementById('depositBtn').onclick = () => tg.sendData(JSON.stringify({ action: 'deposit' }));
        document.getElementById('withdrawBtn').onclick = () => tg.sendData(JSON.stringify({ action: 'withdraw' }));
        document.getElementById('walletBtn').onclick = () => tg.sendData(JSON.stringify({ action: 'connect_wallet' }));

        document.querySelectorAll('.game-card').forEach(card => {
            card.onclick = () => openGame(card.dataset.game);
        });

        document.getElementById('closeGameModal').onclick = () => document.getElementById('gameModal').style.display = 'none';
        window.onclick = (e) => { if (e.target === document.getElementById('gameModal')) document.getElementById('gameModal').style.display = 'none'; };

        tg.sendData(JSON.stringify({ action: 'check_balance' }));
    </script>
