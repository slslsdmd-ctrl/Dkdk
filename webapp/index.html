<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZTEC BET</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="background:#1a1a2e; color:white; font-family:system-ui; text-align:center; padding:20px;">
    <h1>🎰 AZTEC BET</h1>
    <p>Баланс: <span id="balance">0</span> TON</p>
    <button onclick="deposit()" style="padding:10px 20px; margin:10px; background:#2ecc71; border:none; border-radius:10px; color:white;">💎 Пополнить</button>
    <button onclick="withdraw()" style="padding:10px 20px; margin:10px; background:#e74c3c; border:none; border-radius:10px; color:white;">💸 Вывести</button>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        function deposit() {
            tg.sendData(JSON.stringify({ action: 'deposit' }));
        }
        
        function withdraw() {
            tg.sendData(JSON.stringify({ action: 'withdraw' }));
        }
        
        tg.sendData(JSON.stringify({ action: 'check_balance' }));
    </script>
</body>
</html>
