<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AZTEC BET</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 100%);font-family:system-ui;color:white;min-height:100vh}
        .container{max-width:500px;margin:0 auto;padding:20px;text-align:center}
        .btn{display:block;width:100%;padding:15px;margin:10px 0;border-radius:15px;font-size:16px;font-weight:bold;cursor:pointer;border:none}
        .btn-deposit{background:#2ecc71}
        .btn-withdraw{background:#e74c3c}
        .btn-wallet{background:#3498db}
        .games-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:20px}
        .game-card{background:rgba(255,255,255,0.1);border-radius:15px;padding:15px;cursor:pointer}
        .game-emoji{font-size:48px}
    </style>
</head>
<body>
    <div class="container">
        <h1>🎰 AZTEC BET</h1>
        <div style="font-size:36px;color:#ffd700;margin:20px 0" id="balance">0 TON</div>
        
        <button class="btn btn-deposit" id="depositBtn">💎 ПОПОЛНИТЬ</button>
        <button class="btn btn-withdraw" id="withdrawBtn">💸 ВЫВЕСТИ</button>
        <button class="btn btn-wallet" id="walletBtn">🔗 ПРИВЯЗАТЬ КОШЕЛЁК</button>
        
        <div class="games-grid">
            <div class="game-card" onclick="alert('Монетка x2')"><div class="game-emoji">🪙</div><div>Монетка</div></div>
            <div class="game-card" onclick="alert('Число x3')"><div class="game-emoji">🔢</div><div>Число</div></div>
            <div class="game-card" onclick="alert('Кости x3')"><div class="game-emoji">🎲</div><div>Кости</div></div>
            <div class="game-card" onclick="alert('Слоты x5')"><div class="game-emoji">🎰</div><div>Слоты</div></div>
            <div class="game-card" onclick="alert('Рулетка x36')"><div class="game-emoji">🎡</div><div>Рулетка</div></div>
            <div class="game-card" onclick="alert('КНБ x2')"><div class="game-emoji">✂️</div><div>КНБ</div></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        document.getElementById('depositBtn').onclick = () => tg.sendData(JSON.stringify({ action: 'deposit' }));
        document.getElementById('withdrawBtn').onclick = () => tg.sendData(JSON.stringify({ action: 'withdraw' }));
        document.getElementById('walletBtn').onclick = () => tg.sendData(JSON.stringify({ action: 'connect_wallet' }));
    </script>
</body>
</html>
