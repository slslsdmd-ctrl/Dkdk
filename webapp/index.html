<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AZTEC BET</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 100%);font-family:system-ui;color:white;min-height:100vh}
        .container{max-width:500px;margin:0 auto;padding:20px}
        .balance-card{background:linear-gradient(135deg,#1e2a3a 0%,#0f172a 100%);border-radius:25px;padding:20px;text-align:center;margin-bottom:25px}
        .balance-value{font-size:48px;font-weight:bold;color:#ffd700}
        .btn{display:block;width:100%;padding:15px;margin:10px 0;border-radius:15px;font-size:16px;font-weight:bold;cursor:pointer;border:none;transition:transform 0.2s}
        .btn:active{transform:scale(0.97)}
        .btn-deposit{background:#2ecc71;color:white}
        .btn-withdraw{background:#e74c3c;color:white}
        .btn-wallet{background:#3498db;color:white}
        .games-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:20px}
        .game-card{background:rgba(255,255,255,0.1);border-radius:15px;padding:15px;text-align:center;cursor:pointer;transition:all 0.2s}
        .game-card:active{transform:scale(0.95);background:rgba(255,255,255,0.2)}
        .game-emoji{font-size:48px;margin-bottom:10px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:1000;align-items:center;justify-content:center}
        .modal-content{background:#16213e;border-radius:30px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto;padding:20px}
        .modal-header{display:flex;justify-content:space-between;margin-bottom:20px}
        .close-btn{background:none;border:none;color:white;font-size:28px;cursor:pointer}
        .bet-input{width:100%;padding:12px;border-radius:15px;border:1px solid #ffd700;background:rgba(255,255,255,0.1);color:white;font-size:16px;margin:10px 0;text-align:center}
        .choice-buttons{display:flex;gap:10px;margin:20px 0;flex-wrap:wrap}
        .choice-btn{flex:1;padding:12px;background:rgba(255,215,0,0.2);border:1px solid #ffd700;border-radius:15px;color:white;font-size:16px;cursor:pointer;text-align:center}
        .slot-reels{display:flex;justify-content:center;gap:15px;margin:20px 0}
        .slot-reel{font-size:64px;background:rgba(0,0,0,0.5);padding:20px;border-radius:15px;min-width:80px;text-align:center}
        .number-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:20px 0}
        .num-btn{padding:15px;background:rgba(255,215,0,0.2);border:1px solid #ffd700;border-radius:15px;color:white;font-size:18px;cursor:pointer}
        .spin-btn{background:linear-gradient(135deg,#f39c12,#e67e22);border:none;padding:15px;border-radius:30px;color:white;font-size:18px;font-weight:bold;cursor:pointer;width:100%;margin-top:15px}
        .result-text{padding:15px;border-radius:15px;margin-top:15px;text-align:center;font-size:18px}
        .win{background:rgba(46,204,113,0.3);color:#2ecc71}
        .lose{background:rgba(231,76,60,0.3);color:#e74c3c}
        .draw{background:rgba(241,196,15,0.3);color:#f1c40f}
        .footer{text-align:center;margin-top:30px;padding:15px;font-size:12px;color:#666}
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="balance-card">
            <div class="balance-value" id="balance">0</div>
            <div>TON</div>
        </div>
        
        <button class="btn btn-deposit" id="depositBtn">💎 ПОПОЛНИТЬ</button>
        <button class="btn btn-withdraw" id="withdrawBtn">💸 ВЫВЕСТИ</button>
        <button class="btn btn-wallet" id="walletBtn">🔗 ПРИВЯЗАТЬ КОШЕЛЁК</button>
        
        <div class="games-grid">
            <div class="game-card" data-game="coin"><div class="game-emoji">🪙</div><div>Монетка x2</div></div>
            <div class="game-card" data-game="number"><div class="game-emoji">🔢</div><div>Число x3</div></div>
            <div class="game-card" data-game="dice"><div class="game-emoji">🎲</div><div>Кости x3</div></div>
            <div class="game-card" data-game="slot"><div class="game-emoji">🎰</div><div>Слоты x5</div></div>
            <div class="game-card" data-game="roulette"><div class="game-emoji">🎡</div><div>Рулетка x36</div></div>
            <div class="game-card" data-game="rps"><div class="game-emoji">✂️</div><div>КНБ x2</div></div>
        </div>
        
        <div class="footer">AZTEC BET</div>
    </div>

    <div class="modal" id="gameModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="gameTitle">Игра</h3>
                <button class="close-btn" id="closeGameModal">&times;</button>
            </div>
            <div class="modal-body" id="gameContent"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let currentBalance = 0;
        
        function updateBalanceDisplay(value) {
            currentBalance = value;
            document.getElementById('balance').textContent = currentBalance;
        }
        
        function showResult(message, type) {
            const gameContent = document.getElementById('gameContent');
            const resultDiv = document.createElement('div');
            resultDiv.className = `result-text ${type}`;
            resultDiv.textContent = message;
            gameContent.appendChild(resultDiv);
            setTimeout(() => resultDiv.remove(), 2000);
        }
        
        // Монетка
        function playCoin() {
            const bet = parseFloat(document.getElementById('betAmount').value);
            if (isNaN(bet) || bet < 0.1) { tg.showPopup({title:'Ошибка',message:'Ставка от 0.1 TON'}); return; }
            const choice = document.querySelector('input[name="choice"]:checked').value;
            const result = Math.random() < 0.5 ? 'орел' : 'решка';
            const win = choice === result;
            const amount = win ? bet * 2 : -bet;
            showResult(win ? `🎉 ПОБЕДА! +${amount} TON (${result})` : `😢 ПРОИГРЫШ! -${bet} TON (${result})`, win ? 'win' : 'lose');
            tg.sendData(JSON.stringify({ action: 'game_result', game: 'coin', win: win, amount: amount }));
        }
        
        // Число
        function playNumber() {
            const bet = parseFloat(document.getElementById('betAmount').value);
            const guess = parseInt(document.querySelector('input[name="number"]:checked').value);
            if (isNaN(bet) || bet < 0.1) { tg.showPopup({title:'Ошибка',message:'Ставка от 0.1 TON'}); return; }
            const result = Math.floor(Math.random() * 10) + 1;
            const win = guess === result;
            const amount = win ? bet * 3 : -bet;
            showResult(win ? `🎉 ПОБЕДА! +${amount} TON (было ${result})` : `😢 ПРОИГРЫШ! -${bet} TON (было ${result})`, win ? 'win' : 'lose');
            tg.sendData(JSON.stringify({ action: 'game_result', game: 'number', win: win, amount: amount }));
        }
        
        // Кости
        function playDice() {
            const bet = parseFloat(document.getElementById('betAmount').value);
            const choice = document.querySelector('input[name="diceChoice"]:checked').value;
            if (isNaN(bet) || bet < 0.1) { tg.showPopup({title:'Ошибка',message:'Ставка от 0.1 TON'}); return; }
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            const sum = d1 + d2;
            let win = false, amount = -bet, msg = '';
            if (choice === 'sum') {
                const guess = parseInt(document.getElementById('diceSum').value);
                if (guess === sum) { win = true; amount = bet * 3; msg = `🎉 ПОБЕДА! ${d1}+${d2}=${sum} +${amount} TON`; }
                else { msg = `😢 ПРОИГРЫШ! ${d1}+${d2}=${sum} -${bet} TON`; }
            } else if (choice === 'over') {
                if (sum > 7) { win = true; amount = bet * 2; msg = `🎉 ПОБЕДА! ${d1}+${d2}=${sum} >7 +${amount} TON`; }
                else if (sum < 7) { msg = `😢 ПРОИГРЫШ! ${d1}+${d2}=${sum} <7 -${bet} TON`; }
                else { msg = `😐 НИЧЬЯ! ${d1}+${d2}=7`; amount = 0; }
            } else {
                const isEven = sum % 2 === 0;
                if ((choice === 'even' && isEven) || (choice === 'odd' && !isEven)) { win = true; amount = bet * 2; msg = `🎉 ПОБЕДА! ${d1}+${d2}=${sum} +${amount} TON`; }
                else { msg = `😢 ПРОИГРЫШ! ${d1}+${d2}=${sum} -${bet} TON`; }
            }
            showResult(msg, win ? 'win' : (amount === 0 ? 'draw' : 'lose'));
            tg.sendData(JSON.stringify({ action: 'game_result', game: 'dice', win: win, amount: amount }));
        }
        
        // Слоты
        let spinning = false;
        function playSlot() {
            const bet = parseFloat(document.getElementById('betAmount').value);
            if (isNaN(bet) || bet < 0.1) { tg.showPopup({title:'Ошибка',message:'Ставка от 0.1 TON'}); return; }
            if (spinning) return;
            spinning = true;
            const symbols = ['🍒','🍋','🍊','🍉','💎','7️⃣','⭐','🎰'];
            const reels = [document.getElementById('slot1'), document.getElementById('slot2'), document.getElementById('slot3')];
            let spins = 0;
            const interval = setInterval(() => {
                reels.forEach(r => r.textContent = symbols[Math.floor(Math.random() * symbols.length)]);
                spins++;
                if (spins >= 10) {
                    clearInterval(interval);
                    const s1 = reels[0].textContent, s2 = reels[1].textContent, s3 = reels[2].textContent;
                    let mult = 0;
                    if (s1 === s2 && s2 === s3) {
                        if (s1 === '7️⃣' || s1 === '💎' || s1 === '🎰') mult = 5;
                        else if (s1 === '🍉') mult = 4;
                        else if (s1 === '🍒' || s1 === '🍋' || s1 === '🍊') mult = 3;
                        else if (s1 === '⭐') mult = 2;
                    }
                    const win = mult > 0;
                    const amount = win ? bet * mult : -bet;
                    showResult(win ? `🎉 ВЫИГРЫШ! +${amount} TON (x${mult})` : `😢 ПРОИГРЫШ! -${bet} TON`, win ? 'win' : 'lose');
                    tg.sendData(JSON.stringify({ action: 'game_result', game: 'slot', win: win, amount: amount }));
                    spinning = false;
                }
            }, 80);
        }
        
        // Рулетка
        function playRoulette() {
            const bet = parseFloat(document.getElementById('betAmount').value);
            const choice = document.querySelector('input[name="rouletteChoice"]:checked').value;
            if (isNaN(bet) || bet < 0.1) { tg.showPopup({title:'Ошибка',message:'Ставка от 0.1 TON'}); return; }
            const num = Math.floor(Math.random() * 37);
            const red = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
            const black = [2,4,6,8,10,11,13,15,17,20,22,24,26,28,29,31,33,35];
            let win = false, amount = -bet, msg = '';
            if (choice === 'red') {
                if (red.includes(num)) { win = true; amount = bet * 2; msg = `🎉 ПОБЕДА! ${num} 🔴 +${amount} TON`; }
                else { msg = `😢 ПРОИГРЫШ! ${num} -${bet} TON`; }
            } else if (choice === 'black') {
                if (black.includes(num)) { win = true; amount = bet * 2; msg = `🎉 ПОБЕДА! ${num} ⚫ +${amount} TON`; }
                else { msg = `😢 ПРОИГРЫШ! ${num} -${bet} TON`; }
            } else {
                const guess = parseInt(document.getElementById('rouletteNum').value);
                if (guess === num) { win = true; amount = bet * 36; msg = `🎉 ДЖЕКПОТ! ${num} +${amount} TON`; }
                else { msg = `😢 ПРОИГРЫШ! ${num} -${bet} TON`; }
            }
            showResult(msg, win ? 'win' : 'lose');
            tg.sendData(JSON.stringify({ action: 'game_result', game: 'roulette', win: win, amount: amount }));
        }
        
        // КНБ
        function playRPS() {
            const bet = parseFloat(document.getElementById('betAmount').value);
            const choice = document.querySelector('input[name="rpsChoice"]:checked').value;
            if (isNaN(bet) || bet < 0.1) { tg.showPopup({title:'Ошибка',message:'Ставка от 0.1 TON'}); return; }
            const choices = ['rock','scissors','paper'];
            const bot = choices[Math.floor(Math.random() * 3)];
            const names = { rock:'🪨', scissors:'✂️', paper:'📄' };
            let win = false, amount = -bet, msg = '';
            if (choice === bot) { amount = 0; msg = `😐 НИЧЬЯ! ${names[choice]} vs ${names[bot]}`; }
            else if ((choice === 'rock' && bot === 'scissors') || (choice === 'scissors' && bot === 'paper') || (choice === 'paper' && bot === 'rock')) {
                win = true; amount = bet * 2; msg = `🎉 ПОБЕДА! ${names[choice]} vs ${names[bot]} +${amount} TON`;
            } else { msg = `😢 ПРОИГРЫШ! ${names[choice]} vs ${names[bot]} -${bet} TON`; }
            showResult(msg, win ? 'win' : (amount === 0 ? 'draw' : 'lose'));
            tg.sendData(JSON.stringify({ action: 'game_result', game: 'rps', win: win, amount: amount }));
        }
        
        function openGame(game) {
            const modal = document.getElementById('gameModal');
            const gameTitle = document.getElementById('gameTitle');
            const gameContent = document.getElementById('gameContent');
            let html = '';
            
            if (game === 'coin') {
                gameTitle.textContent = '🪙 Монетка (x2)';
                html = `<div><input type="number" id="betAmount" class="bet-input" placeholder="Ставка в TON" step="0.1" min="0.1">
                        <div class="choice-buttons"><label class="choice-btn"><input type="radio" name="choice" value="орел" checked> 🪨 ОРЕЛ</label><label class="choice-btn"><input type="radio" name="choice" value="решка"> 📄 РЕШКА</label></div>
                        <button class="spin-btn" onclick="playCoin()">СДЕЛАТЬ СТАВКУ</button></div>`;
            } else if (game === 'number') {
                gameTitle.textContent = '🔢 Угадай число (x3)';
                let btns = '';
                for (let i = 1; i <= 10; i++) btns += `<button class="num-btn" onclick="document.querySelectorAll('.num-btn').forEach(b=>b.style.background='rgba(255,215,0,0.2)'); this.style.background='#ffd700'; document.getElementById('selectedNum').value=${i}">${i}</button>`;
                html = `<div><input type="number" id="betAmount" class="bet-input" placeholder="Ставка в TON" step="0.1" min="0.1">
                        <input type="hidden" id="selectedNum" value="1">
                        <div class="number-grid">${btns}</div>
                        <button class="spin-btn" onclick="playNumber()">СДЕЛАТЬ СТАВКУ</button></div>`;
            } else if (game === 'dice') {
                gameTitle.textContent = '🎲 Кости';
                html = `<div><input type="number" id="betAmount" class="bet-input" placeholder="Ставка в TON" step="0.1" min="0.1">
                        <div class="choice-buttons"><label class="choice-btn"><input type="radio" name="diceChoice" value="sum" checked> СУММА (x3)</label><label class="choice-btn"><input type="radio" name="diceChoice" value="over"> >7 / <7 (x2)</label><label class="choice-btn"><input type="radio" name="diceChoice" value="even"> ЧЁТ/НЕЧЕТ (x2)</label></div>
                        <div id="diceExtra"><input type="number" id="diceSum" class="bet-input" placeholder="Сумма (2-12)" min="2" max="12"></div>
                        <button class="spin-btn" onclick="playDice()">СДЕЛАТЬ СТАВКУ</button></div>`;
            } else if (game === 'slot') {
                gameTitle.textContent = '🎰 Слоты (x5 max)';
                html = `<div><input type="number" id="betAmount" class="bet-input" placeholder="Ставка в TON" step="0.1" min="0.1">
                        <div class="slot-reels"><div class="slot-reel" id="slot1">🍒</div><div class="slot-reel" id="slot2">🍒</div><div class="slot-reel" id="slot3">🍒</div></div>
                        <button class="spin-btn" onclick="playSlot()">ЗАПУСТИТЬ</button></div>`;
            } else if (game === 'roulette') {
                gameTitle.textContent = '🎡 Рулетка';
                html = `<div><input type="number" id="betAmount" class="bet-input" placeholder="Ставка в TON" step="0.1" min="0.1">
                        <div class="choice-buttons"><label class="choice-btn"><input type="radio" name="rouletteChoice" value="red" checked> 🔴 КРАСНОЕ (x2)</label><label class="choice-btn"><input type="radio" name="rouletteChoice" value="black"> ⚫ ЧЁРНОЕ (x2)</label><label class="choice-btn"><input type="radio" name="rouletteChoice" value="number"> 🔢 ЧИСЛО (x36)</label></div>
                        <div id="rouletteExtra"></div>
                        <button class="spin-btn" onclick="playRoulette()">СДЕЛАТЬ СТАВКУ</button></div>`;
            } else if (game === 'rps') {
                gameTitle.textContent = '✂️ КНБ (x2)';
                html = `<div><input type="number" id="betAmount" class="bet-input" placeholder="Ставка в TON" step="0.1" min="0.1">
                        <div class="choice-buttons"><label class="choice-btn"><input type="radio" name="rpsChoice" value="rock" checked> 🪨 КАМЕНЬ</label><label class="choice-btn"><input type="radio" name="rpsChoice" value="scissors"> ✂️ НОЖНИЦЫ</label><label class="choice-btn"><input type="radio" name="rpsChoice" value="paper"> 📄 БУМАГА</label></div>
                        <button class="spin-btn" onclick="playRPS()">СДЕЛАТЬ СТАВКУ</button></div>`;
            }
            
            gameContent.innerHTML = html;
            modal.style.display = 'flex';
            
            document.querySelectorAll('input[name="diceChoice"]').forEach(r => {
                r.onchange = () => {
                    const extra = document.getElementById('diceExtra');
                    if (r.value === 'sum') extra.innerHTML = '<input type="number" id="diceSum" class="bet-input" placeholder="Сумма (2-12)" min="2" max="12">';
                    else extra.innerHTML = '';
                };
            });
            
            document.querySelectorAll('input[name="rouletteChoice"]').forEach(r => {
                r.onchange = () => {
                    const extra = document.getElementById('rouletteExtra');
                    if (r.value === 'number') extra.innerHTML = '<input type="number" id="rouletteNum" class="bet-input" placeholder="Число (0-36)" min="0" max="36">';
                    else extra.innerHTML = '';
                };
            });
        }
        
        document.getElementById('depositBtn').onclick = () => tg.sendData(JSON.stringify({ action: 'deposit' }));
        document.getElementById('withdrawBtn').onclick = () => tg.sendData(JSON.stringify({ action: 'withdraw' }));
        document.getElementById('walletBtn').onclick = () => tg.sendData(JSON.stringify({ action: 'connect_wallet' }));
        
        document.querySelectorAll('.game-card').forEach(card => {
            card.onclick = () => openGame(card.dataset.game);
        });
        
        document.getElementById('closeGameModal').onclick = () => document.getElementById('gameModal').style.display = 'none';
        window.onclick = (e) => { if (e.target === document.getElementById('gameModal')) document.getElementById('gameModal').style.display = 'none'; };
        
        tg.sendData(JSON.stringify({ action: 'check_balance' }));
    </script>
</body>
</html>
