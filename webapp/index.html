<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AZTEC BET</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: white;
            min-height: 100vh;
            padding-bottom: 30px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes winGlow {
            0% { text-shadow: 0 0 0px gold; }
            50% { text-shadow: 0 0 20px gold; }
            100% { text-shadow: 0 0 0px gold; }
        }

        .animate-fade { animation: fadeIn 0.5s ease; }
        .animate-pulse { animation: pulse 0.3s ease; }
        .animate-shake { animation: shake 0.3s ease; }
        .win-animation { animation: winGlow 0.5s ease; }

        /* Баланс карта */
        .balance-card {
            background: linear-gradient(135deg, #1e2a3a 0%, #0f172a 100%);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,215,0,0.2);
            margin-bottom: 25px;
            transition: transform 0.3s;
        }

        .balance-card:hover { transform: translateY(-2px); }

        .balance-value {
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            margin: 5px 0;
        }

        .balance-label { font-size: 14px; color: #aaa; letter-spacing: 2px; }

        /* Кнопки */
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        .btn:active::after {
            width: 200%;
            height: 200%;
        }

        .btn-deposit { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; }
        .btn-withdraw { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
        .btn-wallet { background: linear-gradient(135deg, #3498db, #2980b9); color: white; }

        .btn:active { transform: scale(0.97); }

        /* Сетка игр */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .game-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,215,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.2), transparent);
            transition: left 0.5s;
        }

        .game-card:hover::before { left: 100%; }
        .game-card:hover { transform: translateY(-5px) scale(1.02); background: rgba(255,255,255,0.1); border-color: #ffd700; }

        .game-emoji { font-size: 48px; margin-bottom: 10px; transition: transform 0.3s; }
        .game-card:hover .game-emoji { transform: scale(1.1); }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: linear-gradient(135deg, #16213e 0%, #0f0f23 100%);
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255,215,0,0.3);
            animation: fadeIn 0.3s ease;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 { color: #ffd700; }
        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .close-btn:hover { transform: scale(1.1); }

        .modal-body { padding: 20px; }

        /* Игровые элементы */
        .game-area {
            text-align: center;
            padding: 20px;
        }

        .bet-input {
            width: 100%;
            padding: 12px;
            border-radius: 15px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            margin: 10px 0;
            text-align: center;
        }

        .choice-buttons {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .choice-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255,215,0,0.2);
            border: 1px solid #ffd700;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .choice-btn:active { transform: scale(0.95); background: #ffd700; color: #1a1a2e; }

        .slot-reels {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .slot-reel {
            font-size: 64px;
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 15px;
            min-width: 80px;
            transition: all 0.1s;
        }

        .spin-btn {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .number-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .num-btn {
            padding: 15px;
            background: rgba(255,215,0,0.2);
            border: 1px solid #ffd700;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .result-text {
            font-size: 20px;
            text-align: center;
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
        }

        .win { background: rgba(46,204,113,0.3); color: #2ecc71; }
        .lose { background: rgba(231,76,60,0.3); color: #e74c3c; }
        .draw { background: rgba(241,196,15,0.3); color: #f1c40f; }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 15px;
            font-size: 12px;
            color: #666;
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container animate-fade">
        <div class="balance-card">
            <div class="balance-label">💰 БАЛАНС</div>
            <div class="balance-value" id="balance">0</div>
            <div class="balance-label">TON</div>
        </div>
        
        <button class="btn btn-deposit" id="depositBtn">💎 ПОПОЛНИТЬ</button>
        <button class="btn btn-withdraw" id="withdrawBtn">💸 ВЫВЕСТИ</button>
        <button class="btn btn-wallet" id="walletBtn">🔗 ПРИВЯЗАТЬ КОШЕЛЁК</button>
        
        <div class="games-grid">
            <div class="game-card" data-game="coin"><div class="game-emoji">🪙</div><div>Монетка</div></div>
            <div class="game-card" data-game="number"><div class="game-emoji">🔢</div><div>Число</div></div>
            <div class="game-card" data-game="dice"><div class="game-emoji">🎲</div><div>Кости</div></div>
            <div class="game-card" data-game="slot"><div class="game-emoji">🎰</div><div>Слоты</div></div>
            <div class="game-card" data-game="roulette"><div class="game-emoji">🎡</div><div>Рулетка</div></div>
            <div class="game-card" data-game="rps"><div class="game-emoji">✂️</div><div>КНБ</div></div>
        </div>
        
        <div class="footer">AZTEC BET</div>
    </div>

    <!-- Модальное окно игры -->
    <div class="modal" id="gameModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="gameTitle">Игра</h3>
                <button class="close-btn" id="closeGameModal">&times;</button>
            </div>
            <div class="modal-body" id="gameContent"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        let currentBalance = 0;

        // Загрузка баланса
        async function loadBalance() {
            tg.sendData(JSON.stringify({ action: 'check_balance' }));
        }

        // Обновление баланса из ответа бота
        function updateBalance(value) {
            currentBalance = value;
            document.getElementById('balance').textContent = currentBalance;
        }

        // Показать результат игры с анимацией
        function showResult(message, type) {
            const resultDiv = document.createElement('div');
            resultDiv.className = `result-text ${type}`;
            resultDiv.textContent = message;
            const gameContent = document.getElementById('gameContent');
            gameContent.appendChild(resultDiv);
            resultDiv.scrollIntoView({ behavior: 'smooth' });
            setTimeout(() => resultDiv.remove(), 2000);
        }

        // Игра Монетка
        function playCoin() {
            const bet = parseFloat(document.getElementById('betAmount').value);
            if (isNaN(bet) || bet < 0.1) {
                tg.showPopup({ title: 'Ошибка', message: 'Введите ставку от 0.1 TON' });
                return false;
            }
            if (bet > currentBalance) {
                tg.showPopup({ title: 'Ошибка', message: 'Недостаточно средств!' });
                return false;
            }
            const choice = document.querySelector('input[name="choice"]:checked').value;
            const result = Math.random() < 0.5 ? 'орел' : 'решка';
            const win = choice === result;
            const amount = win ? bet * 2 : -bet;
            
            // Анимация
            const btn = document.querySelector('.choice-btn:active');
            if (btn) btn.style.animation = 'pulse 0.3s ease';
            
            setTimeout(() => {
                if (win) {
                    showResult(`🎉 ПОБЕДА! +${amount} TON (${result})`, 'win');
                } else {
                    showResult(`😢 ПРОИГРЫШ! -${bet} TON (${result})`, 'lose');
                }
                tg.sendData(JSON.stringify({ action: 'game_result', game: 'coin', win: win, amount: amount }));
                loadBalance();
            }, 300);
            return true;
        }

        // Игра Число
        function playNumber() {
            const bet = parseFloat(document.getElementById('betAmount').value);
            const guess = parseInt(document.querySelector('input[name="number"]:checked').value);
            if (isNaN(bet) || bet < 0.1) {
                tg.showPopup({ title: 'Ошибка', message: 'Введите ставку от 0.1 TON' });
                return false;
            }
            if (bet > currentBalance) {
                tg.showPopup({ title: 'Ошибка', message: 'Недостаточно средств!' });
                return false;
            }
            const result = Math.floor(Math.random() * 10) + 1;
            const win = guess === result;
            const amount = win ? bet * 3 : -bet;
            
            setTimeout(() => {
                if (win) {
                    showResult(`🎉 ПОБЕДА! +${amount} TON (было ${result})`, 'win');
                } else {
                    showResult(`😢 ПРОИГРЫШ! -${bet} TON (было ${result})`, 'lose');
                }
                tg.sendData(JSON.stringify({ action: 'game_result', game: 'number', win: win, amount: amount }));
                loadBalance();
            }, 300);
            return true;
        }

        // Игра Кости
        function playDice() {
            const bet = parseFloat(document.getElementById('betAmount').value);
            const choice = document.querySelector('input[name="diceChoice"]:checked').value;
            if (isNaN(bet) || bet < 0.1) {
                tg.showPopup({ title: 'Ошибка', message: 'Введите ставку от 0.1 TON' });
                return false;
            }
            if (bet > currentBalance) {
                tg.showPopup({ title: 'Ошибка', message: 'Недостаточно средств!' });
                return false;
            }
            const dice1 = Math.floor(Math.random() * 6) + 1;
            const dice2 = Math.floor(Math.random() * 6) + 1;
            const sum = dice1 + dice2;
            
            let win = false;
            let amount = -bet;
            let msg = '';
            
            if (choice === 'sum') {
                const guess = parseInt(document.getElementById('diceSum').value);
                if (guess === sum) {
                    win = true;
                    amount = bet * 3;
                    msg = `🎉 ПОБЕДА! ${dice1}+${dice2}=${sum} +${amount} TON`;
                } else {
                    msg = `😢 ПРОИГРЫШ! ${dice1}+${dice2}=${sum} -${bet} TON`;
                }
            } else if (choice === 'over') {
                if (sum > 7) { win = true; amount = bet * 2; msg = `🎉 ПОБЕДА! ${dice1}+${dice2}=${sum} >7 +${amount} TON`; }
                else if (sum < 7) { msg = `😢 ПРОИГРЫШ! ${dice1}+${dice2}=${sum} <7 -${bet} TON`; }
                else { msg = `😐 НИЧЬЯ! ${dice1}+${dice2}=7`; amount = 0; }
            } else {
                const isEven = sum % 2 === 0;
                if ((choice === 'even' && isEven) || (choice === 'odd' && !isEven)) {
                    win = true;
                    amount = bet * 2;
                    msg = `🎉 ПОБЕДА! ${dice1}+${dice2}=${sum} +${amount} TON`;
                } else {
                    msg = `😢 ПРОИГРЫШ! ${dice1}+${dice2}=${sum} -${bet} TON`;
                }
            }
            
            setTimeout(() => {
                showResult(msg, win ? 'win' : (amount === 0 ? 'draw' : 'lose'));
                tg.sendData(JSON.stringify({ action: 'game_result', game: 'dice', win: win, amount: amount }));
                loadBalance();
            }, 300);
            return true;
        }

        // Игра Слоты
        function playSlot() {
            const bet = parseFloat(document.getElementById('betAmount').value);
            if (isNaN(bet) || bet < 0.1) {
                tg.showPopup({ title: 'Ошибка', message: 'Введите ставку от 0.1 TON' });
                return false;
            }
            if (bet > currentBalance) {
                tg.showPopup({ title: 'Ошибка', message: 'Недостаточно средств!' });
                return false;
            }
            
            const symbols = ['🍒', '🍋', '🍊', '🍉', '💎', '7️⃣', '⭐', '🎰'];
            let reels = [document.getElementById('slot1'), document.getElementById('slot2'), document.getElementById('slot3')];
            
            let spins = 0;
            const interval = setInterval(() => {
                reels.forEach(reel => {
                    reel.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                    reel.style.animation = 'spin 0.1s linear';
                });
                spins++;
                if (spins >= 10) {
                    clearInterval(interval);
                    const s1 = reels[0].textContent, s2 = reels[1].textContent, s3 = reels[2].textContent;
                    let mult = 0;
                    if (s1 === s2 && s2 === s3) {
                        if (s1 === '7️⃣' || s1 === '💎' || s1 === '🎰') mult = 5;
                        else if (s1 === '🍉') mult = 4;
                        else if (s1 === '🍒' || s1 === '🍋' || s1 === '🍊') mult = 3;
                        else if (s1 === '⭐') mult = 2;
                    }
                    const win = mult > 0;
                    const amount = win ? bet * mult : -bet;
                    const msg = win ? `🎉 ВЫИГРЫШ! +${amount} TON (x${mult})` : `😢 ПРОИГРЫШ! -${bet} TON`;
                    showResult(msg, win ? 'win' : 'lose');
                    tg.sendData(JSON.stringify({ action: 'game_result', game: 'slot', win: win, amount: amount }));
                    loadBalance();
                }
            }, 100);
            return true;
        }

        // Игра Рулетка
        function playRoulette() {
            const bet = parseFloat(document.getElementById('betAmount').value);
            const choice = document.querySelector('input[name="rouletteChoice"]:checked').value;
            if (isNaN(bet) || bet < 0.1) {
                tg.showPopup({ title: 'Ошибка', message: 'Введите ставку от 0.1 TON' });
                return false;
            }
            if (bet > currentBalance) {
                tg.showPopup({ title: 'Ошибка', message: 'Недостаточно средств!' });
                return false;
            }
            
            const num = Math.floor(Math.random() * 37);
            const red = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
            const black = [2,4,6,8,10,11,13,15,17,20,22,24,26,28,29,31,33,35];
            
            let win = false;
            let amount = -bet;
            let msg = '';
            
            if (choice === 'red') {
                if (red.includes(num)) { win = true; amount = bet * 2; msg = `🎉 ПОБЕДА! ${num} 🔴 +${amount} TON`; }
                else { msg = `😢 ПРОИГРЫШ! ${num} -${bet} TON`; }
            } else if (choice === 'black') {
                if (black.includes(num)) { win = true; amount = bet * 2; msg = `🎉 ПОБЕДА! ${num} ⚫ +${amount} TON`; }
                else { msg = `😢 ПРОИГРЫШ! ${num} -${bet} TON`; }
            } else {
                const guess = parseInt(document.getElementById('rouletteNum').value);
                if (guess === num) { win = true; amount = bet * 36; msg = `🎉 ДЖЕКПОТ! ${num} +${amount} TON`; }
                else { msg = `😢 ПРОИГРЫШ! ${num} -${bet} TON`; }
            }
            
            setTimeout(() => {
                showResult(msg, win ? 'win' : 'lose');
                tg.sendData(JSON.stringify({ action: 'game_result', game: 'roulette', win: win, amount: amount }));
                loadBalance();
            }, 300);
            return true;
        }

        // Игра КНБ
        function playRPS() {
            const bet = parseFloat(document.getElementById('betAmount').value);
            const choice = document.querySelector('input[name="rpsChoice"]:checked').value;
            if (isNaN(bet) || bet < 0.1) {
                tg.showPopup({ title: 'Ошибка', message: 'Введите ставку от 0.1 TON' });
                return false;
            }
            if (bet > currentBalance) {
                tg.showPopup({ title: 'Ошибка', message: 'Недостаточно средств!' });
                return false;
            }
            
            const choices = ['rock', 'scissors', 'paper'];
            const bot = choices[Math.floor(Math.random() * 3)];
            const names = { rock: '🪨', scissors: '✂️', paper: '📄' };
            
            let win = false;
            let amount = -bet;
            
            if (choice === bot) { amount = 0; }
            else if ((choice === 'rock' && bot === 'scissors') || (choice === 'scissors' && bot === 'paper') || (choice === 'paper' && bot === 'rock')) {
                win = true;
                amount = bet * 2;
            }
            
            const msg = win ? `🎉 ПОБЕДА! ${names[choice]} vs ${names[bot]} +${amount} TON` : 
                        (amount === 0 ? `😐 НИЧЬЯ! ${names[choice]} vs ${names[bot]}` : 
                        `😢 ПРОИГРЫШ! ${names[choice]} vs ${names[bot]} -${bet} TON`);
            
            setTimeout(() => {
                showResult(msg, win ? 'win' : (amount === 0 ? 'draw' : 'lose'));
                tg.sendData(JSON.stringify({ action: 'game_result', game: 'rps', win: win, amount: amount }));
                loadBalance();
            }, 300);
            return true;
        }

        // Открытие игры
        function openGame(game) {
            const modal = document.getElementById('gameModal');
            const gameTitle = document.getElementById('gameTitle');
            const gameContent = document.getElementById('gameContent');
            
            let html = '';
            
            if (game === 'coin') {
                gameTitle.textContent = '🪙 Монетка (x2)';
                html = `
                    <div class="game-area">
                        <input type="number" id="betAmount" class="bet-input" placeholder="Ставка в TON" step="0.1" min="0.1">
                        <div class="choice-buttons">
                            <label class="choice-btn"><input type="radio" name="choice" value="орел" checked> 🪨 ОРЕЛ</label>
                            <label class="choice-btn"><input type="radio" name="choice" value="решка"> 📄 РЕШКА</label>
                        </div>
                        <button class="spin-btn" onclick="playCoin()">СДЕЛАТЬ СТАВКУ</button>
                    </div>
                `;
            } else if (game === 'number') {
                gameTitle.textContent = '🔢 Угадай число (x3)';
                html = `
                    <div class="game-area">
                        <input type="number" id="betAmount" class="bet-input" placeholder="Ставка в TON" step="0.1" min="0.1">
                        <div class="number-grid" id="numberGrid"></div>
                        <button class="spin-btn" id="submitNumber">СДЕЛАТЬ СТАВКУ</button>
                    </div>
                `;
            } else if (game === 'dice') {
                gameTitle.textContent = '🎲 Кости';
                html = `
                    <div class="game-area">
                        <input type="number" id="betAmount" class="bet-input" placeholder="Ставка в TON" step="0.1" min="0.1">
                        <div class="choice-buttons">
                            <label class="choice-btn"><input type="radio" name="diceChoice" value="sum" checked> СУММА (x3)</label>
                            <label class="choice-btn"><input type="radio" name="diceChoice" value="over"> >7 / <7 (x2)</label>
                            <label class="choice-btn"><input type="radio" name="diceChoice" value="even"> ЧЁТ/НЕЧЕТ (x2)</label>
                        </div>
                        <div id="diceExtra"></div>
                        <button class="spin-btn" id="submitDice">СДЕЛАТЬ СТАВКУ</button>
                    </div>
                `;
            } else if (game === 'slot') {
                gameTitle.textContent = '🎰 Слоты (x5 max)';
                html = `
                    <div class="game-area">
                        <input type="number" id="betAmount" class="bet-input" placeholder="Ставка в TON" step="0.1" min="0.1">
                        <div class="slot-reels">
                            <div class="slot-reel" id="slot1">🍒</div>
                            <div class="slot-reel" id="slot2">🍒</div>
                            <div class="slot-reel" id="slot3">🍒</div>
                        </div>
                        <button class="spin-btn" id="submitSlot">ЗАПУСТИТЬ</button>
                    </div>
                `;
            } else if (game === 'roulette') {
                gameTitle.textContent = '🎡 Рулетка';
                html = `
                    <div class="game-area">
                        <input type="number" id="betAmount" class="bet-input" placeholder="Ставка в TON" step="0.1" min="0.1">
                        <div class="choice-buttons">
                            <label class="choice-btn"><input type="radio" name="rouletteChoice" value="red" checked> 🔴 КРАСНОЕ (x2)</label>
                            <label class="choice-btn"><input type="radio" name="rouletteChoice" value="black"> ⚫ ЧЁРНОЕ (x2)</label>
                            <label class="choice-btn"><input type="radio" name="rouletteChoice" value="number"> 🔢 ЧИСЛО (x36)</label>
                        </div>
                        <div id="rouletteExtra"></div>
                        <button class="spin-btn" id="submitRoulette">СДЕЛАТЬ СТАВКУ</button>
                    </div>
                `;
            } else if (game === 'rps') {
                gameTitle.textContent = '✂️ КНБ (x2)';
                html = `
                    <div class="game-area">
                        <input type="number" id="betAmount" class="bet-input" placeholder="Ставка в TON" step="0.1" min="0.1">
                        <div class="choice-buttons">
                            <label class="choice-btn"><input type="radio" name="rpsChoice" value="rock" checked> 🪨 КАМЕНЬ</label>
                            <label class="choice-btn"><input type="radio" name="rpsChoice" value="scissors"> ✂️ НОЖНИЦЫ</label>
                            <label class="choice-btn"><input type="radio" name="rpsChoice" value="paper"> 📄 БУМАГА</label>
                        </div>
                        <button class="spin-btn" id="submitRPS">СДЕЛАТЬ СТАВКУ</button>
                    </div>
                `;
            }
            
            gameContent.innerHTML = html;
            modal.style.display = 'flex';
            
            // Дополнительная настройка для каждой игры
            if (game === 'number') {
                const grid = document.getElementById('numberGrid');
                for (let i = 1; i <= 10; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'num-btn';
                    btn.textContent = i;
                    btn.onclick = () => {
                        document.querySelectorAll('.num-btn').forEach(b => b.style.background = 'rgba(255,215,0,0.2)');
                        btn.style.background = '#ffd700';
                        btn.style.color = '#1a1a2e';
                        document.getElementById('selectedNumber').value = i;
                    };
                    grid.appendChild(btn);
                }
                const hidden = document.createElement('input');
                hidden.type = 'hidden';
                hidden.id = 'selectedNumber';
                hidden.value = 1;
                grid.parentNode.appendChild(hidden);
                document.getElementById('submitNumber').onclick = () => playNumber();
            } else if (game === 'dice') {
                const extra = document.getElementById('diceExtra');
                document.getElementById('submitDice').onclick = () => playDice();
                document.querySelectorAll('input[name="diceChoice"]').forEach(radio => {
                    radio.onchange = () => {
                        if (radio.value === 'sum') {
                            extra.innerHTML = '<input type="number" id="diceSum" class="bet-input" placeholder="Сумма (2-12)" min="2" max="12">';
                        } else {
                            extra.innerHTML = '';
                        }
                    };
                });
            } else if (game === 'slot') {
                document.getElementById('submitSlot').onclick = () => playSlot();
            } else if (game === 'roulette') {
                const extra = document.getElementById('rouletteExtra');
                document.getElementById('submitRoulette').onclick = () => playRoulette();
                document.querySelectorAll('input[name="rouletteChoice"]').forEach(radio => {
                    radio.onchange = () => {
                        if (radio.value === 'number') {
                            extra.innerHTML = '<input type="number" id="rouletteNum" class="bet-input" placeholder="Число (0-36)" min="0" max="36">';
                        } else {
                            extra.innerHTML = '';
                        }
                    };
                });
            } else if (game === 'rps') {
                document.getElementById('submitRPS').onclick = () => playRPS();
            }
        }
        
        // Кнопки
        document.getElementById('depositBtn').onclick = () => {
            tg.sendData(JSON.stringify({ action: 'deposit' }));
        };
        
        document.getElementById('withdrawBtn').onclick = () => {
            tg.sendData(JSON.stringify({ action: 'withdraw' }));
        };
        
        document.getElementById('walletBtn').onclick = () => {
            tg.sendData(JSON.stringify({ action: 'connect_wallet' }));
        };
        
        document.querySelectorAll('.game-card').forEach(card => {
            card.onclick = () => openGame(card.dataset.game);
        });
        
        // Закрытие модалки
        document.getElementById('closeGameModal').onclick = () => {
            document.getElementById('gameModal').style.display = 'none';
        };
        
        window.onclick = (e) => {
            const modal = document.getElementById('gameModal');
            if (e.target === modal) modal.style.display = 'none';
        };
        
        loadBalance();
    </script>
</body>
</html>
